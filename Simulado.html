<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simulado de Filosofia</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 0 auto;
      padding: 24px;
      line-height: 1.5;
    }

    h1, h2, h3 {
      margin-top: 0;
    }

    .hidden {
      display: none;
    }

    .menu-section,
    .quiz-section,
    .result-box {
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .button-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
    }

    button {
      padding: 10px 14px;
      border: 1px solid #bbb;
      background: #f7f7f7;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: #ececec;
    }

    .question-meta {
      font-size: 14px;
      color: #555;
      margin-bottom: 10px;
    }

    .question-text {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 16px;
    }

    .option {
      display: block;
      margin: 10px 0;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      cursor: pointer;
    }

    .option:hover {
      background: #fafafa;
    }

    .feedback {
      margin-top: 18px;
      padding: 14px;
      border-radius: 8px;
    }

    .correct {
      background: #eef9f0;
      border: 1px solid #b7dfbe;
      color: #1d6b2a;
    }

    .wrong {
      background: #fff0f0;
      border: 1px solid #e1b7b7;
      color: #8a1f1f;
    }

    .explanation {
      margin-top: 10px;
    }

    .nav-buttons {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .progress {
      margin-bottom: 16px;
      font-size: 14px;
      color: #444;
    }
  </style>
</head>
<body>
  <h1>Simulado de Filosofia</h1>

  <section id="menuSection" class="menu-section">
    <h2>Escolha como deseja estudar</h2>
    <p>Você pode fazer o simulado completo ou treinar por categoria.</p>

    <div class="button-group">
      <button id="startFullQuizBtn">Simulado completo</button>
    </div>

    <h3 style="margin-top: 24px;">Treinar por categoria</h3>
    <div id="categoriesContainer" class="button-group"></div>
  </section>

  <section id="quizSection" class="quiz-section hidden">
    <div class="progress" id="progressText"></div>
    <div class="question-meta" id="questionMeta"></div>
    <div class="question-text" id="questionText"></div>
    <div id="optionsContainer"></div>

    <div id="feedbackContainer"></div>

    <div class="nav-buttons">
      <button id="nextQuestionBtn" disabled>Próxima</button>
      <button id="backToMenuBtn">Voltar ao início</button>
    </div>
  </section>

  <section id="resultSection" class="result-box hidden">
    <h2>Fim do simulado</h2>
    <p id="resultText"></p>
    <div class="button-group">
      <button id="restartSameModeBtn">Refazer este modo</button>
      <button id="resultBackToMenuBtn">Voltar ao início</button>
    </div>
  </section>

  <script src="questions.js"></script>
  <script src="script.js"></script>
</body>
</html>
